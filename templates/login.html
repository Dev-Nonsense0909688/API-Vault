<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>API Vault Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #2EEB78;
            --primary-dark: #13B85A;
            --bg: #F5F7FA;
            --card: #fff;
            --text: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 15px 40px rgba(0, 0, 0, .12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffffff, #effdec);
        }

        .login-card {
            width: 420px;
            background: var(--card);
            border-radius: 18px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: auto;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 18px;

            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 2rem;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            color: var(--text);
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group-text {
            background: white;
        }

        .form-control {
            height: 50px;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 .2rem rgba(46, 235, 120, .15);
        }

        .btn-login {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 10px;

            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 600;

            transition: .2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: var(--text-light);
            font-size: .9rem;
        }

        .signal {
            width: 100%;
            color: rgb(235, 47, 75);
            text-align: center;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <div class="login-card">

        <div class="logo">
            <i class="bi bi-key-fill"></i>
        </div>

        <h2>API Vault</h2>
        <p class="subtitle">
            Securely manage all your API keys
        </p>

        <form onsubmit="login(event)">

            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" class="form-control" placeholder="Password" id="password">
            </div>

            <button class="btn-login" type="submit" id="btn-login">
                Login
            </button>
            <div class="signal" id="signal"></div>
        </form>

        <div class="footer">
            API Vault • Secure Key Management
        </div>

    </div>
    <script src="/static/script.js"></script>
</body>

</html>
